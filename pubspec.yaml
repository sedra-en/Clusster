name: cluster_app
description: "A new Flutter project for Cluster Academy."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Network
  http: ^1.1.0

  # Charts (Modern)
  syncfusion_flutter_charts: ^33.2.6
  fl_chart: ^1.2.0

  # UI & Fonts
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # Localization
  easy_localization: ^3.0.7

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Media & Files
  image_picker: ^1.0.7
  file_picker: ^11.0.2   # ✅ نسخة واحدة فقط

  # Audio Recording
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
    - assets/icons/